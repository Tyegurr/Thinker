name: Crash Report
description: Report a crash
labels: [crash]
assignees: Alphalaneous
body: 
  - type: markdown
    attributes:
      value: |
        ## Report a Crash

  - type: input
    id: tinker-version
    attributes: 
      label: Tinker version
      description: The version of Tinker you are currently using.
      placeholder: The version number (such as v1.0.0-beta.14)
    validations:
      required: true

  - type: input
    id: geode-version
    attributes: 
      label: Geode version
      description: The version of Geode you are currently using.
      placeholder: The version number (such as v5.5.3)
    validations:
      required: true

  - type: dropdown
    id: crash-type
    attributes:
      label: Crash Type
      description: The type of crash that occurred
      options:
      - Random
      - Consistent
    validations:
      required: true

  - type: dropdown
    id: crash-replication
    attributes:
      label: Crash Replication
      description: Can you replicate the steps to cause this crash?
      options:
      - Yes
      - No
    validations:
      required: true

  - type: textarea
    id: crashlog-description
    attributes:
      label: Description
      description: What caused the crash? What steps does it take to replicate it? What were you doing before it happened?
      placeholder: Crash description
    validations:
      required: true

  - type: textarea
    id: crashlog
    attributes:
      label: Crashlog
      description: |
        Please include the latest crashlog from `.../Geometry Dash/geode/crashlogs`.
        You can access these crashlogs from the launcher settings on iOS and Android
        Make sure that the mod list is in your crashlog. Do not submit incomplete crash logs or images of crash logs.
      placeholder: Place your crash log here...
        ...
    validations:
      required: true

  - type: textarea
    id: media
    attributes:
      label: Extra Media
      description: If you have any images, video, or other attachments for the crash report, please put them here.
    validations:
      required: false

  - type: checkboxes
    id: platform
    attributes:
      label: Platform
      description: What platform are you using?
      options:
      - label: Windows
      - label: Mac (Intel)
      - label: Mac (Arm)
      - label: Android (32-bit)
      - label: Android (64-bit)
      - label: iOS
      - label: iOS (Jitless)
      - label: Linux
    validations:
      required: true